<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omeguhl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div id="modal">
            <h2>Customize Your Profile</h2>
            <div id="avatar-preview">
                <span id="char-eyes">o o</span><br>
                <span id="char-mouth">___</span>
            </div>
            <div class="customizer">
                <button onclick="changeFeature('eyes')">Eyes</button>
                <button onclick="changeFeature('mouth')">Mouth</button>
            </div>
            <input type="text" id="usernameInput" placeholder="Username" maxlength="15">
            <br>
            <label><input type="checkbox" id="tosCheck"> 18+ & Agree to Terms</label>
            <br><br>
            <button onclick="enterSite()">Start Chatting</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Omeguhl 🌐</h1>
            <span id="counter-badge">🟢 <span id="count">0</span> Online</span>
        </div>
        
        <div id="menu">
            <div class="box">
                <input type="text" id="roomInput" placeholder="Public Room Name">
                <button onclick="joinPublic()">Join Room</button>
            </div>
            <button onclick="startPrivate()" style="width:100%; padding:20px;">Find 1-on-1 Partner</button>
        </div>

        <div id="chat-window" style="display:none;">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
                <button id="skipBtn" style="background:orange; display:none;" onclick="skipPartner()">Skip</button>
            </div>
            <button onclick="location.reload()" style="background:red; margin-top:10px;">Exit</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = null;
        let mode = '';

        const eyes = ["o o", "O O", "u u", "> <", "^ ^", "● ●"];
        const mouths = ["___", "  v  ", "  ◡  ", "  o  ", "  ~  "];
        let eyeIdx = 0, mouthIdx = 0;

        function changeFeature(type) {
            if(type === 'eyes') eyeIdx = (eyeIdx + 1) % eyes.length;
            if(type === 'mouth') mouthIdx = (mouthIdx + 1) % mouths.length;
            document.getElementById('char-eyes').innerText = eyes[eyeIdx];
            document.getElementById('char-mouth').innerText = mouths[mouthIdx];
        }

        // UPDATE COUNT ON UI
        socket.on('user-count', (count) => {
            document.getElementById('count').innerText = count;
        });

        function enterSite() {
            const user = document.getElementById('usernameInput').value;
            if(!user || !document.getElementById('tosCheck').checked) return alert("Complete profile first!");
            socket.emit('set-profile', { username: user, avatar: document.getElementById('avatar-preview').innerText });
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        function joinPublic() {
            currentRoom = document.getElementById('roomInput').value || 'General';
            mode = 'public';
            showChat();
            socket.emit('join-room', currentRoom);
        }

        function startPrivate() {
            mode = 'private';
            showChat();
            document.getElementById('skipBtn').style.display = 'inline-block';
            socket.emit('find-pair');
        }

        function skipPartner() {
            if(currentRoom) socket.emit('skip', currentRoom);
            else location.reload();
        }

        socket.on('pair-found', (data) => {
            currentRoom = data.room;
            addMessage('System', '', 'Connected! 🤝');
        });

        socket.on('partner-skipped', () => {
            addMessage('System', '', 'Partner skipped.');
            currentRoom = null;
            document.getElementById('skipBtn').innerText = 'New?';
            document.getElementById('skipBtn').onclick = () => location.reload();
        });

        socket.on('chat-message', (data) => {
            addMessage(data.user, data.avatar, data.text);
        });

        function showChat() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('chat-window').style.display = 'block';
        }

        function sendMessage() {
            const msg = document.getElementById('msgInput').value;
            if (!msg) return;
            if (mode === 'public') socket.emit('send-public-msg', { room: currentRoom, msg: msg });
            else socket.emit('send-private-msg', { room: currentRoom, msg: msg });
            document.getElementById('msgInput').value = '';
        }

        function addMessage(user, avatar, text) {
            const msgDiv = document.getElementById('messages');
            const av = avatar ? `<span class="chat-avatar">${avatar}</span>` : '';
            msgDiv.innerHTML += `<div class="msg-row">${av} <strong>${user}:</strong> ${text}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
